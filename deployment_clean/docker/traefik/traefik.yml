# Terminates TLS on :443 and forwards to backend over HTTP.

log:
  level: INFO

accessLog: {}

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false

tls:
  certificates:
    - certFile: /certs/cert.pem
      keyFile: /certs/key.pem
